[flake8]
max-line-length = 120

exclude =
    .git,
    __pycache__,
    migrations,
    venv,
    .venv

ignore =
    E203,
    W503


[isort]
profile = black
line_length = 120

known_first_party =
    tiny_api,
    tinyurl

skip =
    migrations
    .git,
    __pycache__,
    migrations,
    venv,
    .venv